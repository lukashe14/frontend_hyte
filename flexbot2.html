<!DOCTYPE html>
<html>
  <head>
    <title>Positioning Items</title>
    <meta charset="UTF-8" />
    <style>
      /*////////////////////
        // Positioning items
        //////////////////////

        Reset *
        Display: inline vs block
        https://www.w3schools.com/cssref/pr_class_display.asp

        Box-sizing
        https://www.w3schools.com/css/css3_box-sizing.asp

        Using percentages and max-width
        https://www.w3schools.com/cssref/css_units.asp
        Centering
        https://www.w3schools.com/css/css_align.asp

        Float and clear
        https://www.w3schools.com/cssref/pr_class_float.asp

        Absolute/Relative positioning
        https://www.w3schools.com/cssref/pr_class_position.asp


        Flexbox - https://www.w3schools.com/css/css3_flexbox.asp
        */

      * {
        box-sizing: border-box;
      }

      body {
      }

      .box {

        border: 1px solid black;
        color: aliceblue;
      }




      .clear {
        clear: both;
      }

      /* img */
      img {
      }

      /* container */
      .container {
      }

      /* relative and absolute positioning with blue */
      #blue {
      }

      .wrapper {
        background-color: darkslategrey;


        width: 100%;


      }

      #heading {
        background-color: rgb(92, 86, 141);
        height: 100px;
        width: 100px;
        border: 1px solid black;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }


      #left {
        background-color: rgb(168, 105, 148);
        height: 100px;
        border: 1px solid black;
        flex: 1;
      }
      #right {

        height: 100px;
        border: 1px solid black;
        flex: 5;
        flex-direction: column;

      }
      #top {
        background-color: aqua;
        flex: 1;
      }
      #bottom {
        background-color: chocolate;
        flex: 1;
      }

      #footer {
        background-color: grey;
        color: black;
        width: 100%;
        height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      main {
        display: flex;
        height: 300px;
        gap: 20px;
      }
      #heading ul{
        display: flex;
        list-style-type: none;
        justify-content: flex-start;
      }
      #heading li {
        width: 50px;
        background-color: bisque;
        padding: 5px;
        margin: 10px;
        text-align: center;
      }
      button {
        height: 40px;
        background-color: blueviolet;
        color: aliceblue;

      }
    </style>
  </head>

  <body>
  <div class="wrapper">
    <div id="heading">
      <ul>
        <li>Home</li>
        <li>Cats</li>
      </ul>
      <button>LOGIN</button>
      </div>
    <main>
      <div id="left">Left</div>
      <div id="right">
        <div id="top">TOP</div>
        <div id="bottom">bottom</div>
      </div>
    </main>
    <div id="footer">
      <p>copyright by Lukas</p>
    </div>

  </div>

    <!-- Float continues, clearing -->


    <!-- Responsive images and centering -->
  </body>
</html>
