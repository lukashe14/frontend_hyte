<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
  </head>

  <body>

    <h3>REGISTER</h3>


    <!-- https://www.w3schools.com/css/css_form.asp -->
    <!-- https://www.w3schools.com/css/tryit.asp?filename=trycss_form_padding -->



    </pre>
    <form class="registerForm">
      <label for="username">Username (3-20 kirjainta)</label>
      <input
        id="username"
        minlength="3"
        maxlength="20"
        type="text"
        name="username"
        placeholder="daisy"
        required
      />
      <label for="password">Password (min 8, isoja ja pieniä kirjaimia)</label>
      <input
        id="password"
        minlength="8"
        type="password"
        name="password"
        placeholder="duck"
        required
      />
      <label for="password">Email (Metropolia.fi päätteinen)</label>
      <input
        id="email"
        type="email"
        name="email"
        placeholder="daisy@example.com"
        pattern="^[A-Za-z0-9._%+\-]+@metropolia\.fi$"
        title="Sähköpostin pitää päättyä @metropolia.fi"
        required
      />
      <input
        name="submit"
        type="submit"
        value="Add User"
        class="postuser"
      />
    </form>
  </div>
  </div>

    <h3>LOGIN</h3>
    <div>
      <div class="loginContainer">
      <form class="loginForm">
        <label for="username">Username</label>
        <input type="text" name="username" placeholder="name" value="" />
        <label for="password">Password</label>
        <input
          type="password"
          name="password"
          placeholder="name123"
          value=""
        />
        <input
          name="submit"
          type="submit"
          value="Login and get new token"
          class="loginform"
        />
        </div>
      </form>
      <br />
      <div id="loginResponse"></div>
    </div>
    <hr />
    <div>
      <button id="meRequest">Make an "authenticated" request</button>
      <br />
      <div id="meResponse"></div>
    </div>
    <hr />
    <div>
      <button id="clearButton">Clear localStorage</button>
      <br />
      <code id="clearResponse"></code>
    </div>
  </body>

  <script type="module" src="/login.js"></script>
</html>
